# Phase 1 — Supervised Fine-Tuning config
# Inherits base_config.yaml; values here override base.

defaults:
  - base_config

# LoRA / QLoRA
lora:
  use_qlora: true                   # QLoRA default for 24 GB cards
  rank: 32                          # sweep: [16, 32, 64]
  alpha: 32                         # FIXED across all rank experiments — do not change between runs
  dropout: 0.05
  # rsLoRA: false — using standard α/r scaling, not α/√r
  use_rslora: false
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: "none"
  task_type: "CAUSAL_LM"

# QLoRA quantization
bnb:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: "bfloat16"

# Training hyperparameters (community defaults — treat as sweep starting points)
training:
  output_dir: "./artifacts/sft"
  num_train_epochs: 2               # sweep: [1, 2, 3]
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 8    # effective batch = 32
  learning_rate: 1.0e-4             # sweep: [1e-4, 2e-4]
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.0
  max_grad_norm: 1.0
  bf16: true
  fp16: false
  gradient_checkpointing: true
  dataloader_num_workers: 4
  max_seq_length: 2048
  # Checkpoint every N steps; best checkpoint (not last) promoted to Phase 2
  save_strategy: "steps"
  save_steps: 200
  eval_strategy: "steps"
  eval_steps: 200
  load_best_model_at_end: true
  metric_for_best_model: "eval_f1"
  greater_is_better: true
  logging_steps: 10
  # Sample generations logged every N steps for drift monitoring
  generation_log_steps: 100
  generation_log_samples: 4

# Multi-GPU (accelerate)
accelerate:
  num_processes: 1                  # set >1 for multi-GPU
  mixed_precision: "bf16"
  fsdp: false
